<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Painel Administrativo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* ===== SEU CSS ORIGINAL MANTIDO ===== */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #1a2a1a 0%, #2a382a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-container {
    background: rgba(255,255,255,0.95);
    padding: 50px 40px;
    border-radius: 30px;
    width: 100%;
    max-width: 420px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group input {
    width: 100%;
    padding: 15px;
    border-radius: 15px;
    border: 2px solid rgba(193,123,76,0.2);
}

.btn-login {
    width: 100%;
    padding: 16px;
    background: #c17b4c;
    border: none;
    border-radius: 15px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.error-message {
    display: none;
    background: #ffebee;
    color: #c62828;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 15px;
    text-align: center;
}

</style>
</head>
    
<body>

<div class="login-container">

<h1 style="text-align:center; margin-bottom:20px;">PAINEL ADM</h1>

<div class="error-message" id="error-message"></div>

<form id="loginForm">

<div class="form-group">
<label>Usuário</label>
<input type="text" id="username" autocomplete="off">
</div>

<div class="form-group">
<label>Senha</label>
<input type="password" id="password" autocomplete="off">
</div>

<button type="submit" class="btn-login" id="btn-submit">
ENTRAR
</button>

</form>

</div>

<script>

async function checkLoggedIn() {
    try {
        const response = await fetch('/api/check-auth', {
            credentials: 'include' // 🔥 IMPORTANTE
        });

        const data = await response.json();

        if (data.authenticated) {
            window.location.href = '/admin.html';
        }

    } catch (err) {
        console.log("Erro ao verificar autenticação");
    }
}
document.getElementById('loginForm')
.addEventListener('submit', async (e) => {

    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorDiv = document.getElementById('error-message');
    const btn = document.getElementById('btn-submit');

    if (!username || !password) {
        errorDiv.style.display = "block";
        errorDiv.textContent = "Preencha usuário e senha";
        return;
    }

    btn.disabled = true;
    btn.textContent = "ENTRANDO...";

    try {

        const response = await fetch('/api/login', {
            method: 'POST',
            credentials: 'include', // 🔥 IMPORTANTE
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
            window.location.href = "/admin.html";
        } else {
            errorDiv.style.display = "block";
            errorDiv.textContent = "Usuário ou senha inválidos";
            btn.disabled = false;
            btn.textContent = "ENTRAR";
        }

    } catch (error) {

        errorDiv.style.display = "block";
        errorDiv.textContent = "Erro ao conectar com servidor";
        btn.disabled = false;
        btn.textContent = "ENTRAR";

    }

});


checkLoggedIn();

</script>

</body>
</html>
